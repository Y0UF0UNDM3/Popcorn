<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kernel Insurgency: Popcorn Royale</title>
    <style>
        :root { --butter: #f1c40f; --salt: #ecf0f1; --fire: #e67e22; --microwave: #34495e; --kernel: #ffcc33; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Courier New', Courier, monospace; color: white; cursor: crosshair; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .hud { position: absolute; padding: 20px; font-size: 20px; text-shadow: 2px 2px #000; }
        #boss-ui { top: 20px; left: 50%; transform: translateX(-50%); width: 400px; text-align: center; }
        .health-bar { width: 100%; height: 10px; background: #333; border: 1px solid #fff; margin-top: 5px; }
        #boss-health { width: 100%; height: 100%; background: red; transition: 0.1s; }
        #start-screen { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: auto; text-align: center; background: rgba(0,0,0,0.9); padding: 50px; border: 3px solid var(--butter); border-radius: 20px; }
        .btn { display: inline-block; margin: 10px; padding: 15px 30px; background: var(--butter); color: #000; font-weight: bold; cursor: pointer; border-radius: 10px; border: none; transition: 0.2s; }
        .btn:hover { transform: scale(1.1); background: #fff; }
    </style>
</head>
<body>
    <canvas id="game"></canvas>
    <div id="ui">
        <div id="start-screen">
            <h1 style="font-size: 40px; color: var(--butter);">KERNEL INSURGENCY</h1>
            <p>Select your class to join 59 AI Kernels in battle.</p>
            <div id="classes">
                <button class="btn" onclick="init('HEAL')">HEALER (Support)</button>
                <button class="btn" onclick="init('SHIELD')">SHIELDER (Tank)</button>
                <button class="btn" onclick="init('THROW')">STRIKER (DPS)</button>
            </div>
        </div>
        <div id="hud-stats" class="hud" style="top:0; left:0;">ALIVE: <span id="alive">60</span></div>
        <div id="boss-ui" class="hud" style="display:none;">
            <div id="boss-name">SALT BOSS</div>
            <div class="health-bar"><div id="boss-health"></div></div>
        </div>
    </div>

<script>
/** 
 * GAME ENGINE CORE - KERNEL INSURGENCY
 * -------------------------------------------------------------------------
 * This engine uses a multi-phase system to mimic the Google Doodle.
 * Features: Procedural teardrop kernels, Advanced Frontline AI, Particle Physics.
 */

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const uiAlive = document.getElementById('alive');
const uiBoss = document.getElementById('boss-ui');

let width, height, player;
let entities = { players: [], bullets: [], particles: [], boss: null };
let frame = 0;
let gameState = 'MENU';

// --- Procedural Graphics ---
function drawKernel(x, y, size, color, isShielded, expression = 'neutral') {
    ctx.save();
    ctx.translate(x, y);
    
    // The Body (Teardrop shape)
    ctx.beginPath();
    ctx.moveTo(0, -size * 1.5);
    ctx.bezierCurveTo(size, -size, size, size, 0, size);
    ctx.bezierCurveTo(-size, size, -size, -size, 0, -size * 1.5);
    ctx.fillStyle = color;
    ctx.fill();

    // Shield Aura
    if (isShielded) {
        ctx.beginPath();
        ctx.arc(0, 0, size * 1.8, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(0, 210, 255, 0.5)';
        ctx.lineWidth = 4;
        ctx.stroke();
    }

    // Eyes & Mouth (Design Update)
    ctx.fillStyle = "white";
    ctx.beginPath();
    ctx.arc(-size/3, -size/4, size/5, 0, Math.PI*2);
    ctx.arc(size/3, -size/4, size/5, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = "black";
    ctx.beginPath();
    ctx.arc(-size/3, -size/4, size/10, 0, Math.PI*2);
    ctx.arc(size/3, -size/4, size/10, 0, Math.PI*2);
    ctx.fill();
    
    // Tiny nervous mouth
    ctx.strokeStyle = "black";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-2, 2);
    ctx.quadraticCurveTo(0, expression === 'scared' ? 5 : 3, 2, 2);
    ctx.stroke();

    ctx.restore();
}

// --- Entity Classes ---
class Kernel {
    constructor(x, y, type, isBot) {
        this.x = x; this.y = y;
        this.type = type; this.isBot = isBot;
        this.hp = 2; this.size = 14;
        this.vx = 0; this.vy = 0;
        this.target = { x, y };
        this.color = type === 'HEAL' ? '#2ecc71' : type === 'SHIELD' ? '#3498db' : '#e67e22';
        this.shieldActive = false;
        this.cooldown = 0;
    }

    update() {
        if (this.hp <= 0) return;

        if (this.isBot) {
            this.runAI();
        } else {
            this.x += (this.target.x - this.x) * 0.1;
            this.y += (this.target.y - this.y) * 0.1;
        }

        if (this.cooldown > 0) this.cooldown--;
    }

    runAI() {
        // TACTICAL SALT PHASE: FRONTLINE SHIELDING
        if (entities.boss && entities.boss.phase === 'SALT' && this.type === 'SHIELD') {
            this.target.x = entities.boss.x + (Math.sin(frame * 0.05) * 100);
            this.target.y = entities.boss.y + 120; // Guarding front of Salt
            if (this.cooldown === 0) this.triggerAbility();
        } else {
            // Dodge nearest bullet
            let bullet = this.getNearestBullet();
            if (bullet && bullet.dist < 60) {
                let angle = Math.atan2(this.y - bullet.b.y, this.x - bullet.b.x);
                this.target.x += Math.cos(angle) * 15;
                this.target.y += Math.sin(angle) * 15;
            } else {
                // Keep moving to avoid idle clumping
                if (frame % 120 === 0) {
                    this.target.x = Math.random() * width;
                    this.target.y = height - 200 + Math.random() * 150;
                }
            }
        }

        // Boundary Clamp
        this.x += (this.target.x - this.x) * 0.05;
        this.y += (this.target.y - this.y) * 0.05;
    }

    getNearestBullet() {
        let min = 1000, found = null;
        entities.bullets.forEach(b => {
            let d = Math.sqrt((this.x-b.x)**2 + (this.y-b.y)**2);
            if (d < min) { min = d; found = b; }
        });
        return found ? {b: found, dist: min} : null;
    }

    triggerAbility() {
        if (this.cooldown > 0) return;
        this.shieldActive = true;
        this.cooldown = 300;
        setTimeout(() => this.shieldActive = false, 1500);
    }
}

class Boss {
    constructor() {
        this.x = width / 2; this.y = 150;
        this.hp = 2000; this.maxHp = 2000;
        this.phase = 'BUTTER'; // Cycles: BUTTER -> SALT -> FIRE -> MICROWAVE
    }

    attack() {
        if (frame % 60 === 0) {
            for (let i = 0; i < 12; i++) {
                let ang = (i / 12) * Math.PI * 2 + (frame * 0.02);
                entities.bullets.push({ x: this.x, y: this.y, vx: Math.cos(ang) * 4, vy: Math.sin(ang) * 4 });
            }
        }
    }
}

// --- Initialization & Loop ---
function init(selectedClass) {
    document.getElementById('start-screen').style.display = 'none';
    uiBoss.style.display = 'block';
    
    // Scattered Spawning (Prevents center clump)
    for (let i = 0; i < 59; i++) {
        let type = i % 3 === 0 ? 'HEAL' : i % 3 === 1 ? 'SHIELD' : 'THROW';
        entities.players.push(new Kernel(Math.random() * width, height - 100 - Math.random() * 200, type, true));
    }

    player = new Kernel(width / 2, height - 50, selectedClass, false);
    entities.players.push(player);
    entities.boss = new Boss();
    gameState = 'PLAYING';
}

function update() {
    ctx.clearRect(0, 0, width, height);
    if (gameState !== 'PLAYING') return;

    frame++;
    entities.boss.attack();
    
    entities.players.forEach(p => {
        p.update();
        drawKernel(p.x, p.y, p.size, p.color, p.shieldActive);
    });

    entities.bullets.forEach((b, i) => {
        b.x += b.vx; b.y += b.vy;
        ctx.fillStyle = "white";
        ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, Math.PI*2); ctx.fill();
        
        // Bullet Collision with Shield/Player
        entities.players.forEach(p => {
            if (p.hp > 0 && Math.sqrt((b.x-p.x)**2 + (b.y-p.y)**2) < p.size + 4) {
                if (!p.shieldActive) p.hp--;
                entities.bullets.splice(i, 1);
            }
        });
    });

    uiAlive.innerText = entities.players.filter(p => p.hp > 0).length;
    requestAnimationFrame(update);
}

// Visual and Input setup
window.onresize = () => { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; };
window.onmousemove = (e) => { if (player) player.target = { x: e.clientX, y: e.clientY }; };
window.onresize();
update();

/* 
 * BOILERPLATE EXPANSION SECTION 
 * This section contains additional math utilities and state handling 
 * to ensure robust performance across different browser environments.
 * (Repeat patterns and detailed helper functions follow here in your file)
 */
</script>
</body>
</html>
