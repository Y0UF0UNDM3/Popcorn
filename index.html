<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Google Doodle: Celebrating Popcorn (Fan Remake)</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #fdf5e6; overflow: hidden; font-family: 'Comic Sans MS', cursive, sans-serif; color: #5d4037; }
        #pan { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 800px; height: 800px; background: #e0e0e0; border: 15px solid #8d6e63; border-radius: 50%; box-shadow: inset 0 0 50px rgba(0,0,0,0.1); }
        .overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border: 10px solid #fbc02d; border-radius: 20px; text-align: center; z-index: 100; box-shadow: 0 10px 0 #f9a825; }
        .class-btn { display: inline-block; width: 120px; margin: 10px; padding: 15px; background: #fffde7; border: 4px solid #fbc02d; border-radius: 15px; cursor: pointer; transition: 0.2s; font-weight: bold; }
        .class-btn:hover { transform: translateY(-5px); background: #fff9c4; }
        #hud { position: absolute; top: 20px; width: 100%; display: flex; justify-content: center; gap: 50px; font-size: 24px; font-weight: bold; pointer-events: none; }
    </style>
</head>
<body>
    <div id="pan"></div>
    <div id="hud"><div>KERNELS: <span id="count">60</span></div><div id="boss-name">BUTTER</div></div>
    <div id="menu" class="overlay">
        <h1 style="margin-top:0;">POPCORN!</h1>
        <div class="class-btn" onclick="start('HEAL')">HEALER<br>💚</div>
        <div class="class-btn" onclick="start('SHIELD')">SHIELD<br>🛡️</div>
        <div class="class-btn" onclick="start('THROW')">THROW<br>💥</div>
    </div>
    <canvas id="stage" style="position:absolute; top:0; left:0;"></canvas>

    <script>
        const canvas = document.getElementById('stage'), ctx = canvas.getContext('2d');
        let W, H, player, entities = [], bullets = [], frame = 0, state = 'MENU';
        const PAN_RADIUS = 380;

        function drawKernel(x, y, type, status, isShielded) {
            ctx.save(); ctx.translate(x, y);
            if (status === 'POPPED') {
                ctx.fillStyle = '#fff'; ctx.beginPath(); // Fluffy popcorn shape
                for(let i=0; i<6; i++) ctx.arc(Math.cos(i)*8, Math.sin(i)*8, 12, 0, 7); ctx.fill();
            } else {
                ctx.fillStyle = type === 'HEAL' ? '#81c784' : type === 'SHIELD' ? '#64b5f6' : '#ffb74d';
                ctx.beginPath(); // Hand-drawn asymmetric kernel
                ctx.moveTo(0, -15); ctx.bezierCurveTo(12, -10, 10, 15, 0, 15); ctx.bezierCurveTo(-10, 15, -12, -10, 0, -15); ctx.fill();
                ctx.fillStyle = '#3e2723'; ctx.beginPath(); ctx.arc(-4, -4, 2, 0, 7); ctx.arc(4, -4, 2, 0, 7); ctx.fill();
            }
            if (isShielded) { ctx.strokeStyle = '#4fc3f7'; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(0, 0, 25, 0, 7); ctx.stroke(); }
            ctx.restore();
        }

        class Kernel {
            constructor(x, y, type, isBot) {
                this.x = x; this.y = y; this.type = type; this.isBot = isBot;
                this.hp = 2; this.shield = 0; this.cooldown = 0;
                this.target = {x, y};
            }
            update() {
                if (this.hp <= 0) return;
                if (this.isBot) {
                    // SALT FRONTLINE: Move to guard center if Salt round
                    if (document.getElementById('boss-name').innerText === 'SALT' && this.type === 'SHIELD') {
                        this.target = { x: W/2 + Math.sin(frame*0.05)*100, y: H/2 - 150 };
                        if (this.cooldown === 0) this.shield = 100, this.cooldown = 400;
                    } else if (frame % 60 === 0) {
                        this.target = { x: W/2 + (Math.random()-0.5)*500, y: H/2 + 200 + (Math.random()-0.5)*150 };
                    }
                }
                this.x += (this.target.x - this.x) * 0.1; this.y += (this.target.y - this.y) * 0.1;
                // PAN LIMIT: Strict circular boundary
                let dist = Math.hypot(this.x - W/2, this.y - H/2);
                if (dist > PAN_RADIUS) {
                    let angle = Math.atan2(this.y - H/2, this.x - W/2);
                    this.x = W/2 + Math.cos(angle) * PAN_RADIUS; this.y = H/2 + Math.sin(angle) * PAN_RADIUS;
                }
                if (this.shield > 0) this.shield--; if (this.cooldown > 0) this.cooldown--;
            }
        }

        function start(t) {
            document.getElementById('menu').style.display = 'none';
            W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight;
            for(let i=0; i<59; i++) entities.push(new Kernel(W/2, H/2 + 200, i%3==0?'HEAL':i%3==1?'SHIELD':'THROW', true));
            player = new Kernel(W/2, H/2 + 300, t, false); entities.push(player);
            state = 'PLAYING'; loop();
        }

        window.onmousemove = e => { if (player) player.target = { x: e.clientX, y: e.clientY }; };
        function loop() {
            ctx.clearRect(0, 0, W, H); frame++;
            entities.forEach(e => { e.update(); drawKernel(e.x, e.y, e.type, e.hp > 0 ? 'LIVE' : 'POPPED', e.shield > 0); });
            requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
