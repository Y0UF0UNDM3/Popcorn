<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kernel Insurgency: Elite Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="ui-container">
        <!-- Main Menu -->
        <div id="main-menu" class="overlay active">
            <div class="logo">KERNEL INSURGENCY</div>
            <p>60 Kernels. 4 Legendary Bosses. survive or pop.</p>
            <div class="class-selection">
                <div class="class-card" onclick="startGame('HEAL')">
                    <div class="icon">💚</div>
                    <div class="label">HEALER</div>
                    <div class="desc">Absorbs projectiles to recover.</div>
                </div>
                <div class="class-card" onclick="startGame('SHIELD')">
                    <div class="icon">🛡️</div>
                    <div class="label">SHIELDER</div>
                    <div class="desc">Reflects shots back at bosses.</div>
                </div>
                <div class="class-card" onclick="startGame('THROW')">
                    <div class="icon">💥</div>
                    <div class="label">STRIKER</div>
                    <div class="desc">Catches and hurls danger back.</div>
                </div>
            </div>
        </div>

        <!-- HUD -->
        <div id="hud">
            <div class="stats">ALIVE: <span id="alive-count">60</span></div>
            <div id="boss-display">
                <div id="boss-name">BUTTER PHASE</div>
                <div class="health-container"><div id="boss-hp-bar"></div></div>
            </div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        /**
         * KERNEL INSURGENCY ENGINE v5.0
         * Architected for 3000+ line expansibility.
         */
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, player, boss, gameState = 'MENU';
        let entities = [], projectiles = [], particles = [], frameCount = 0;

        // --- Vectors & Math ---
        class Vec2 {
            constructor(x, y) { this.x = x; this.y = y; }
            add(v) { return new Vec2(this.x + v.x, this.y + v.y); }
            sub(v) { return new Vec2(this.x - v.x, this.y - v.y); }
            dist(v) { return Math.sqrt((this.x - v.x)**2 + (this.y - v.y)**2); }
            lerp(v, t) { return new Vec2(this.x + (v.x - this.x) * t, this.y + (v.y - this.y) * t); }
        }

        // --- Procedural Kernel Design ---
        function renderKernel(ctx, x, y, size, color, isShielded, expr = 'neutral') {
            ctx.save();
            ctx.translate(x, y);
            
            // The organic teardrop body
            ctx.beginPath();
            ctx.moveTo(0, -size * 1.5);
            ctx.bezierCurveTo(size * 1.2, -size, size * 1.2, size, 0, size);
            ctx.bezierCurveTo(-size * 1.2, size, -size * 1.2, -size, 0, -size * 1.5);
            ctx.fillStyle = color;
            ctx.fill();

            // Expressive Eyes
            ctx.fillStyle = "white";
            ctx.beginPath(); 
            ctx.arc(-size/3, -size/5, size/4, 0, 7); 
            ctx.arc(size/3, -size/5, size/4, 0, 7); 
            ctx.fill();
            
            ctx.fillStyle = "black";
            let offset = expr === 'scared' ? Math.sin(frameCount * 0.2) * 2 : 0;
            ctx.beginPath(); 
            ctx.arc(-size/3, -size/5 + offset, size/10, 0, 7); 
            ctx.arc(size/3, -size/5 + offset, size/10, 0, 7); 
            ctx.fill();

            if (isShielded) {
                ctx.beginPath();
                ctx.arc(0, 0, size * 2.2, 0, Math.PI * 2);
                ctx.strokeStyle = "rgba(0, 210, 255, 0.6)";
                ctx.lineWidth = 5;
                ctx.stroke();
            }
            ctx.restore();
        }

        // --- Actor Logic ---
        class Kernel {
            constructor(x, y, type, isBot = true) {
                this.pos = new Vec2(x, y);
                this.target = new Vec2(x, y);
                this.type = type;
                this.isBot = isBot;
                this.hp = 2;
                this.cooldown = 0;
                this.activeTimer = 0;
                this.color = type === 'HEAL' ? '#2ecc71' : type === 'SHIELD' ? '#3498db' : '#e67e22';
            }

            update() {
                if (this.hp <= 0) return;
                
                if (this.isBot) {
                    this.runTacticalAI();
                } else {
                    this.pos = this.pos.lerp(this.target, 0.15);
                }

                if (this.cooldown > 0) this.cooldown--;
                if (this.activeTimer > 0) this.activeTimer--;
            }

            runTacticalAI() {
                // SALT PHASE FRONTLINE LOGIC
                if (boss && boss.phase === 'SALT' && this.type === 'SHIELD') {
                    this.target.x = boss.pos.x + Math.sin(frameCount * 0.05 + entities.indexOf(this)) * 150;
                    this.target.y = boss.pos.y + 140; // Frontline Wall
                    if (this.cooldown === 0) this.useAbility();
                } else {
                    // Standard survival & dodging
                    let threat = this.getNearestProjectile();
                    if (threat && threat.dist < 80) {
                        let diff = this.pos.sub(threat.p.pos);
                        this.target = this.pos.add(new Vec2(diff.x * 2, diff.y * 2));
                    } else if (frameCount % 120 === 0) {
                        this.target = new Vec2(Math.random() * width, height - 300 + Math.random() * 250);
                    }
                }
                this.pos = this.pos.lerp(this.target, 0.08);
            }

            getNearestProjectile() {
                let min = 1000, found = null;
                projectiles.forEach(p => {
                    let d = this.pos.dist(p.pos);
                    if (d < min) { min = d; found = p; }
                });
                return found ? {p: found, dist: min} : null;
            }

            useAbility() {
                if (this.cooldown > 0) return;
                this.activeTimer = 90;
                this.cooldown = 350;
            }
        }

        class Boss {
            constructor() {
                this.pos = new Vec2(width/2, 180);
                this.hp = 10000;
                this.phase = 'BUTTER';
            }
            update() {
                if (frameCount % 45 === 0) this.attack();
            }
            attack() {
                for(let i=0; i<16; i++) {
                    let ang = (i/16) * Math.PI * 2 + (frameCount * 0.02);
                    projectiles.push({ pos: new Vec2(this.pos.x, this.pos.y), vx: Math.cos(ang)*5, vy: Math.sin(ang)*5 });
                }
            }
        }

        // --- Core Lifecycle ---
        function startGame(cl) {
            document.getElementById('main-menu').classList.remove('active');
            resize();
            
            // Scattered spawn for 59 bots
            for(let i=0; i<59; i++) {
                let tx = Math.random() * width;
                let ty = height - 100 - Math.random() * 200;
                let type = i % 3 === 0 ? 'HEAL' : i % 3 === 1 ? 'SHIELD' : 'THROW';
                entities.push(new Kernel(tx, ty, type, true));
            }
            
            player = new Kernel(width/2, height-150, cl, false);
            entities.push(player);
            boss = new Boss();
            gameState = 'PLAYING';
            loop();
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.onresize = resize;
        window.onmousemove = e => { if (player) player.target = new Vec2(e.clientX, e.clientY); };
        window.onkeydown = e => { if (e.code === 'Space' && player) player.useAbility(); };

        function loop() {
            ctx.clearRect(0,0,width,height);
            if (gameState !== 'PLAYING') return;
            frameCount++;
            
            boss.update();
            entities.forEach(e => {
                e.update();
                renderKernel(ctx, e.pos.x, e.pos.y, 18, e.color, e.activeTimer > 0, e.hp < 2 ? 'scared' : 'neutral');
            });

            projectiles.forEach((p, i) => {
                p.pos.x += p.vx; p.pos.y += p.vy;
                ctx.fillStyle = "white";
                ctx.beginPath(); ctx.arc(p.pos.x, p.pos.y, 5, 0, 7); ctx.fill();
                
                entities.forEach(e => {
                    if (e.hp > 0 && e.pos.dist(p.pos) < 22) {
                        if (e.activeTimer <= 0) e.hp--;
                        projectiles.splice(i, 1);
                    }
                });
            });

            document.getElementById('alive-count').innerText = entities.filter(e => e.hp > 0).length;
            requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
